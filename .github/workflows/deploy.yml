name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Build portfolio
        working-directory: ./frontend
        run: yarn build
        env:
          CI: false

      - name: Verify build output
        working-directory: ./frontend/build
        run: |
          echo "=== Build folder contents ==="
          ls -la
          echo "=== Checking index.html ==="
          if [ -f index.html ]; then echo "✓ index.html found"; else echo "✗ index.html missing"; fi
          echo "=== Checking 404.html ==="
          if [ -f 404.html ]; then echo "✓ 404.html found"; else echo "✗ 404.html missing"; fi
          echo "=== Checking .nojekyll ==="
          if [ -f .nojekyll ]; then echo "✓ .nojekyll found"; else echo "✗ .nojekyll missing"; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
